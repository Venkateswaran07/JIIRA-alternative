services:
  postgres:
    image: postgres:17-alpine
    container_name: jiira-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jiira
      POSTGRES_USER: jiira
      POSTGRES_PASSWORD: jiira_dev_password
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - jiira_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jiira -d jiira"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  jiira_postgres_data:
